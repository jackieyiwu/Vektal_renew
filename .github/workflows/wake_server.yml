name: Wake Up Renqi Server (Single Repo + Full VLESS Proxy)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-wake-script:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Playwright 及相关依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          playwright install-deps

      # ==========================================
      # 👇 启动 Xray 代理内核 (注入完整版节点配置)
      # ==========================================
      - name: 启动 Xray 代理内核
        run: |
          echo "下载完整版 Xray-core..."
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip -d xray-core
          
          # 赋予最高执行权限
          chmod +x xray-core/xray
          
          echo "写入完整的节点配置文件..."
          cat << 'EOF' > xray-core/config.json
          {
            "log": {
              "loglevel": "warning"
            },
            "dns": {
              "hosts": {
