                ],
                "doh.pub": [
                  "1.12.12.12",
                  "120.53.53.53"
                ],
                "dns.quad9.net": [
                  "9.9.9.9",
                  "149.112.112.112",
                  "2620:fe::fe",
                  "2620:fe::9"
                ],
                "dns.yandex.net": [
                  "77.88.8.8",
                  "77.88.8.1",
                  "2a02:6b8::feed:0ff",
                  "2a02:6b8:0:1::feed:0ff"
                ],
                "dns.sb": [
                  "185.222.222.222",
                  "2a09::"
                ],
                "dns.umbrella.com": [
                  "208.67.220.220",
                  "208.67.222.222",
                  "2620:119:35::35",
