                    "114.114.115.110",
                    "180.184.1.1",
                    "180.184.2.2",
                    "101.226.4.6",
                    "218.30.118.6",
                    "123.125.81.6",
                    "140.207.198.6",
                    "1.2.4.8",
                    "210.2.4.8",
                    "52.80.66.66",
                    "117.50.22.22",
                    "2400:7fc0:849e:200::4",
                    "2404:c2c0:85d8:901::4",
                    "117.50.10.10",
                    "52.80.52.52",
                    "2400:7fc0:849e:200::8",
                    "2404:c2c0:85d8:901::8",
                    "117.50.60.30",
                    "52.80.60.30"
                  ]
                },
                {
                  "type": "field",
                  "outboundTag": "direct",
                  "domain": [
                    "domain:alidns.com",
                    "domain:doh.pub",
                    "domain:dot.pub",
                    "domain:360.cn",
                    "domain:onedns.net"
                  ]
                },
                {
                  "type": "field",
                  "outboundTag": "direct",
                  "ip": [
                    "geoip:cn"
                  ]
                },
                {
                  "type": "field",
                  "outboundTag": "direct",
                  "domain": [
                    "geosite:cn"
                  ]
                }
              ]
            }
          }
          EOF
          
          echo "在后台启动 Xray 代理服务..."
          cd xray-core
          nohup ./xray run -c config.json > xray.log 2>&1 &
          
          echo "等待 8 秒确保家宽节点建立安全连接..."
          sleep 8
          
          echo "测试代理连通性..."
          if curl -x socks5://127.0.0.1:10808 -s https://ifconfig.me; then
            echo -e "\n✅ 代理连接成功！可以继续执行。"
          else
            echo -e "\n❌ 代理测试彻底失败！正在打印 Xray 运行日志排查原因："
            cat xray.log
          fi
          cd ..

      - name: 运行面板唤醒脚本 (走本地代理)
        env:
          PANEL_COOKIE: ${{ secrets.PANEL_COOKIE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" python start_server.py

      - name: 提取监控截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-status-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
