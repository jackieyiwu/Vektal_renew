name: Vektal UI Auto Earn (Stealth + VLESS Proxy)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-secret-script:
    runs-on: ubuntu-latest
    steps:
      # ==========================================
      # 👇 1. 恢复：潜入私有仓库获取代码
      # ==========================================
      - name: 潜入私有仓库获取代码
        uses: actions/checkout@v4
        with:
          repository: 'kanezikii/Vektal_renew' 
          token: ${{ secrets.PRIVATE_REPO_TOKEN }} 
          path: 'secret-script' 

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Playwright 及相关依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          playwright install-deps

      # ==========================================
      # 👇 2. 启动 Xray 代理内核 (挂载美国纯净家宽)
      # ==========================================
      - name: 启动 Xray 代理内核
        run: |
          echo "下载完整版 Xray-core..."
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip -d xray-core
          
          echo "写入家宽节点配置文件..."
          cat << 'EOF' > xray-core/config.json
          {
            "log": { "loglevel": "warning" },
            "inbounds": [
              {
                "tag": "socks",
                "port": 10808,
                "listen": "127.0.0.1",
                "protocol": "mixed",
                "sniffing": {
                  "enabled": true,
                  "destOverride": ["http", "tls", "quic", "fakedns"],
                  "routeOnly": false
                },
                "settings": { "auth": "noauth", "udp": true, "allowTransparent": false }
              }
            ],
            "outbounds": [
              {
                "tag": "proxy",
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": "nni.gfw2500.com",
                      "port": 57345,
                      "users": [
                        {
                          "id": "551d248a-ea9d-4cc3-a896-4576761d9419",
                          "email": "t@t.tt",
                          "security": "auto",
                          "encryption": "none",
                          "flow": "xtls-rprx-vision"
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "tcp",
                  "security": "reality",
                  "realitySettings": {
                    "serverName": "www.amazon.com",
                    "fingerprint": "chrome",
                    "show": false,
                    "publicKey": "rYH4wPTVzSwtpXgI3U7YxppIP6oudD-425vT7pyhj1w",
                    "shortId": "",
                    "spiderX": "",
                    "mldsa65Verify": ""
                  }
                },
                "mux": { "enabled": false, "concurrency": -1 }
              },
              { "tag": "direct", "protocol": "freedom" },
              { "tag": "block", "protocol": "blackhole" }
            ],
            "routing": {
              "domainStrategy": "AsIs",
              "rules": [
                { "type": "field", "inboundTag": ["api"], "outboundTag": "api" },
                { "type": "field", "port": "443", "network": "udp", "outboundTag": "block" },
                { "type": "field", "outboundTag": "proxy", "domain": ["geosite:google"] },
                { "type": "field", "outboundTag": "direct", "ip": ["geoip:private"] },
                { "type": "field", "outboundTag": "direct", "domain": ["geosite:private"] },
                { "type": "field", "outboundTag": "direct", "domain": ["domain:alidns.com", "domain:doh.pub", "domain:dot.pub", "domain:360.cn", "domain:onedns.net"] },
                { "type": "field", "outboundTag": "direct", "ip": ["geoip:cn"] },
                { "type": "field", "outboundTag": "direct", "domain": ["geosite:cn"] }
              ]
            }
          }
          EOF
          
          echo "在后台启动 Xray 代理服务..."
          cd xray-core
          nohup ./xray run -c config.json > xray.log 2>&1 &
          
          echo "等待 8 秒确保家宽节点建立安全连接..."
          sleep 8
          
          echo "测试代理连通性..."
          curl -x socks5://127.0.0.1:10808 -s https://ifconfig.me || echo "代理测试无响应，将强行进入下一步"
          cd ..

      # ==========================================
      # 👇 3. 运行下载好的脚本，数据流走本地 10808 代理
      # ==========================================
      - name: 在黑暗中运行印钞机 (走本地代理)
        env:
          MY_COOKIE: ${{ secrets.MY_COOKIE }}
          VEKTAL_USER: ${{ secrets.PANEL_USER }}
          VEKTAL_PASS: ${{ secrets.PANEL_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 加上了 secret-script/ 路径！
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" python secret-script/vektal_ui.py

      - name: 提取监控截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
