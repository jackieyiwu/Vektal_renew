name: Wake Up Renqi Server (macOS + VLESS)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-wake-script:
    # 👇 核心魔法：改用苹果 macOS 机房，绕过节点商对 Azure 的封锁
    runs-on: macos-13
    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Playwright 及相关依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium

      - name: 启动 Xray 代理内核 (Mac版)
        env:
          NODE_CONFIG: ${{ secrets.XRAY_JSON }}
        run: |
          echo "下载 Mac 版 Xray-core..."
          # 注意：这里换成了 macOS 版本的 Xray
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-macos-64.zip
          unzip -q xray.zip -d xray-core
          
          chmod +x xray-core/xray
          echo "$NODE_CONFIG" > xray-core/config.json
          
          echo "在后台启动 Xray 代理服务..."
          cd xray-core
          nohup ./xray run -c config.json > xray.log 2>&1 &
          
          echo "等待 10 秒建立连接..."
          sleep 10
          
          # Mac 自带 curl，直接测试
          curl -x http://127.0.0.1:10808 -s -m 15 https://api.ipify.org || echo "超时，但强行继续"
          cd ..

      - name: 运行面板唤醒脚本
        env:
          PANEL_COOKIE: ${{ secrets.PANEL_COOKIE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 👇 Mac 环境下无需 xvfb，直接原生运行！
          python start_server.py

      - name: 提取监控截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-status-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
