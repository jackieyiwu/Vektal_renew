name: Wake Up Renqi Server (Xray Proxy Mode)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  run-wake-script:
    runs-on: ubuntu-latest
    steps:
      - name: 获取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Playwright 及相关依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          playwright install-deps


      # ==========================================
      # 👇 运行面板唤醒脚本
      # ==========================================
      - name: 运行面板唤醒脚本 (走本地代理)
        env:
          PANEL_COOKIE: ${{ secrets.PANEL_COOKIE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" python start_server.py

      - name: 提取监控截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-status-screenshots
          path: screenshots/*.png
          if-no-files-found: ignore
